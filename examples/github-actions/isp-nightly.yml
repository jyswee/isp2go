# Nightly ISP2Go snapshot, straight from CI.
#
# Copy this to .github/workflows/isp-nightly.yml in your own repo, then add a
# repository secret named ISP2GO_KEY (your tenant key from `isp signup`).
#
# It prints an ISP snapshot — customers, outstanding balance, billing stats —
# handy as a standing "state of the ISP" you can glance at in the Actions log,
# or wire into a Slack/webhook step.

name: isp nightly

on:
  schedule:
    - cron: '0 7 * * *'   # 07:00 UTC every day
  workflow_dispatch:       # ...or run it on demand

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install isp
        run: npm install -g isp2go

      - name: Configure isp
        run: isp login --local --key "$ISP2GO_KEY"
        env:
          ISP2GO_KEY: ${{ secrets.ISP2GO_KEY }}

      - name: ISP snapshot
        run: isp status

      - name: Billing stats
        run: isp billing-stats
